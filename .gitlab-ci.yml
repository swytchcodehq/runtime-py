stages:
  - lint
  - test
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.12"

# Cache pip dependencies
cache:
  paths:
    - .cache/pip
    - venv/

# Lint job
lint:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install ruff black mypy
  script:
    - source venv/bin/activate
    - ruff check swytchcode_runtime/
    - ruff format --check swytchcode_runtime/
    - mypy swytchcode_runtime/ || true  # Optional type checking
  only:
    - merge_requests
    - main
    - tags

# Test job (add your tests here when ready)
test:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install pytest pytest-cov
  script:
    - source venv/bin/activate
    - pip install -e .
    - pytest tests/ -v --cov=swytchcode_runtime --cov-report=term-missing || echo "No tests found, skipping"
  only:
    - merge_requests
    - main
    - tags

# Build job
build:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip build twine
  script:
    - source venv/bin/activate
    - python -m build
    - mkdir -p dist_artifacts
    - cp dist/* dist_artifacts/
  artifacts:
    paths:
      - dist_artifacts/
    expire_in: 1 week
  only:
    - tags
    - main

# Extract version from git tag
.extract_version: &extract_version
  - |
    if [[ "$CI_COMMIT_TAG" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
      VERSION="${BASH_REMATCH[1]}"
      echo "Extracted version: $VERSION"
    else
      echo "Error: Tag $CI_COMMIT_TAG does not match version pattern (v1.2.3 or 1.2.3)"
      exit 1
    fi

# Update version in pyproject.toml
.update_version: &update_version
  - |
    python << EOF
    import re
    import sys
    
    version = "$VERSION"
    file_path = "pyproject.toml"
    
    with open(file_path, 'r') as f:
        content = f.read()
    
    # Update version line
    content = re.sub(
        r'^version = ".*"',
        f'version = "{version}"',
        content,
        flags=re.MULTILINE
    )
    
    with open(file_path, 'w') as f:
        f.write(content)
    
    print(f"Updated version to {version} in pyproject.toml")
    EOF

# Publish to PyPI (automatic on tags)
publish_pypi:
  stage: release
  image: python:${PYTHON_VERSION}
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip build twine
  script:
    - *extract_version
    - *update_version
    - source venv/bin/activate
    - python -m build
    - |
      if [ -z "$PYPI_API_TOKEN" ]; then
        echo "Error: PYPI_API_TOKEN is not set"
        exit 1
      fi
    - echo "Uploading to PyPI..."
    - twine upload --username __token__ --password "$PYPI_API_TOKEN" dist/*
    - echo "✓ Successfully published to PyPI"
  only:
    - tags
  dependencies:
    - lint
    - test
  environment:
    name: pypi
    url: https://pypi.org/project/swytchcode-runtime/

# Create GitLab release (automatic on tags, after PyPI publish)
create_release:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl jq
  script:
    - *extract_version
    - |
      # Use GITLAB_API_TOKEN if set, otherwise fall back to CI_JOB_TOKEN
      TOKEN="${GITLAB_API_TOKEN:-$CI_JOB_TOKEN}"
      
      if [ -z "$TOKEN" ]; then
        echo "Warning: No GitLab API token found. Set GITLAB_API_TOKEN CI variable for release creation."
        exit 0
      fi
      
      # Create release notes from git tag message or changelog
      if [ -f CHANGELOG.md ]; then
        # Extract changelog entry for this version
        RELEASE_NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 || echo "Release $VERSION")
      else
        # Use git tag message if available
        RELEASE_NOTES=$(git tag -l --format='%(contents)' "$CI_COMMIT_TAG" 2>/dev/null || echo "Release $VERSION")
      fi
      
      # Create GitLab release
      RESPONSE=$(curl -s -w "\n%{http_code}" --request POST \
        --header "PRIVATE-TOKEN: $TOKEN" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"v$VERSION\",
          \"tag_name\": \"$CI_COMMIT_TAG\",
          \"description\": $(echo "$RELEASE_NOTES" | jq -Rs .),
          \"assets\": {
            \"links\": [
              {
                \"name\": \"PyPI Package\",
                \"url\": \"https://pypi.org/project/swytchcode-runtime/$VERSION/\"
              }
            ]
          }
        }" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases")
      
      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | sed '$d')
      
      if [ "$HTTP_CODE" = "201" ]; then
        echo "✓ GitLab release created successfully"
      elif [ "$HTTP_CODE" = "400" ] && echo "$BODY" | grep -q "already exists"; then
        echo "ℹ Release already exists, skipping"
      else
        echo "✗ Failed to create release (HTTP $HTTP_CODE)"
        echo "$BODY"
        exit 1
      fi
  only:
    - tags
  dependencies:
    - publish_pypi
